<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRC 100 Day Challenge — Individual Module</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a class="nav-brand" href="index.html">
      <span class="mark">SRC</span>
      <span class="name">100 DAY CHALLENGE</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" data-page="overview">Overview</a></li>
      <li><a href="teams.html" data-page="teams">Teams</a></li>
      <li><a href="individuals.html" data-page="individuals">Individuals</a></li>
      <li><a href="weekly.html" data-page="weekly">Weekly</a></li>
    </ul>
    <span class="sync-badge" id="syncBadge"></span>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <p class="eyebrow">Individual module</p>
    <h1>Find your name</h1>
    <p class="sub">Search a name to pull up personal points, streak and progress.</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Type a participant name…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</header>

<main class="section">
  <div class="wrap">
    <div id="profilePanel"></div>
  </div>

  <div class="wrap" style="margin-top:16px">
    <div class="section-head">
      <h2>Full leaderboard</h2>
    </div>
    <div class="lb-controls" id="lbControls">
      <button data-sort="total" class="active">Activity + Bonus points</button>
      <button data-sort="activity">Activity points</button>
      <button data-sort="bonus">Bonus points</button>
      <button data-sort="streak">Streak</button>
    </div>
    <div class="panel">
      <table class="member-table" style="width:100%">
        <thead>
          <tr><th>Rank</th><th>Name</th><th>Team</th><th>Activity</th><th>Bonus</th><th>Total</th><th>Streak</th></tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <span>SRC 100 Day Challenge — individual module</span>
    <span id="footSync"></span>
  </div>
</footer>

<!-- Loading toast -->
<div class="loading-toast" id="loadingToast">
  <div class="loading-spinner"></div>
  <span>Fetching latest data…</span>
</div>

<script src="dashboard.js"></script>
<script>
markActiveNav('individuals');

let ALL_PARTICIPANTS = [];
let DAILY_BREAKDOWN = [];
let EVENT_INFO = null;
let currentSort = 'total';
let personalChart = null;
let personalDonut = null;

fetchDashboard().then(data => {
  renderSyncBadge(document.getElementById('syncBadge'), data.generated_at);
  document.getElementById('footSync').textContent = 'Last synced: ' + new Date(data.generated_at).toLocaleString('en-IN');
  ALL_PARTICIPANTS = data.participants;
  DAILY_BREAKDOWN = data.daily_breakdown || [];
  EVENT_INFO = data.event;

  renderLeaderboard();

  const params = new URLSearchParams(window.location.search);
  const preselect = params.get('name');
  if (preselect) {
    const match = ALL_PARTICIPANTS.find(p => p.name.toLowerCase() === preselect.toLowerCase());
    if (match) renderProfile(match);
  } else {
    document.getElementById('profilePanel').innerHTML = emptyProfileHtml();
  }
}).catch(err => {
  document.getElementById('profilePanel').innerHTML =
    '<div class="empty-state"><div class="big">Could not load data</div>' + err.message + '</div>';
});

// Listen for background fresh data
window.addEventListener('dashboardFreshData', e => {
  const data = e.detail;
  ALL_PARTICIPANTS = data.participants;
  DAILY_BREAKDOWN = data.daily_breakdown || [];
  EVENT_INFO = data.event;
  renderLeaderboard();
});

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }
  const matches = ALL_PARTICIPANTS.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { searchResults.classList.remove('open'); return; }
  searchResults.innerHTML = matches.map(p => `
    <div class="opt" data-name="${p.name}">
      <span>${p.name}</span>
      <span class="t">${p.team}</span>
    </div>
  `).join('');
  searchResults.classList.add('open');
});

searchResults.addEventListener('click', (e) => {
  const opt = e.target.closest('.opt');
  if (!opt) return;
  const match = ALL_PARTICIPANTS.find(p => p.name === opt.dataset.name);
  if (match) {
    renderProfile(match);
    searchInput.value = match.name;
    searchResults.classList.remove('open');
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) searchResults.classList.remove('open');
});

function emptyProfileHtml() {
  return '<div class="panel empty-state"><div class="big">No one selected yet</div>Search a name above, or pick a row from the leaderboard below.</div>';
}

function renderProfile(p) {
  const color = teamColor(p.team);
  const progressPct = EVENT_INFO ? Math.round((p.streak / EVENT_INFO.total_days) * 100) : 0;

  // Calculate rank
  const sorted = [...ALL_PARTICIPANTS].sort((a, b) => b.total_points - a.total_points);
  const rank = sorted.findIndex(x => x.name === p.name) + 1;
  const totalP = ALL_PARTICIPANTS.length;

  // Calculate average comparison
  const groupAvg = totalP > 0 ? Math.round(ALL_PARTICIPANTS.reduce((s, x) => s + x.total_points, 0) / totalP) : 0;

  // Get person's daily data
  const personDays = DAILY_BREAKDOWN.filter(r => r.name === p.name);
  const personDates = [...new Set(personDays.map(r => r.date))].sort();
  const personSports = {};
  personDays.forEach(r => {
    if (r.sport) personSports[r.sport] = (personSports[r.sport] || 0) + 1;
  });

  // Milestones from bonus data (inferred from streak)
  const milestones = [];
  if (p.streak >= 7) milestones.push({ label: '7-Day Streak', icon: '🔥' });
  if (p.streak >= 30) milestones.push({ label: '30-Day Streak', icon: '⚡' });
  if (p.streak >= 50) milestones.push({ label: '50-Day Streak', icon: '💎' });
  if (p.streak >= 100) milestones.push({ label: '100 Days Full Finish', icon: '🏆' });
  const sportsSet = new Set(personDays.map(r => r.sport).filter(Boolean));
  if (sportsSet.size >= 5) milestones.push({ label: 'Variety Bonus', icon: '🌈' });

  const allSports = ["Running","Cycling","Walking","Swimming","Hiking","Rowing","Triathlon","Badminton","Tennis","Table Tennis","Squash","Pickleball","Football / Soccer","Cricket","Basketball","Volleyball","Baseball","Rugby","Hockey","Kabaddi","Kho Kho","Golf","Archery","Bowling","Snooker / Billiards","Meditation","Chess","Wrestling","Boxing","Judo","Karate","Taekwondo","MMA","Weightlifting","Powerlifting","CrossFit","Gym Workout","Yoga","Pilates","Skating","Skiing","Snowboarding","Surfing","Diving","Canoeing","Kayaking","Rock Climbing","Mountaineering","Horse Riding","Suryanamaskar","Stair Climbing","Dance","Zumba"];
  const active = new Set(p.sports_this_week || []);

  document.getElementById('profilePanel').innerHTML = `
    <div class="panel">
      <div class="profile-head">
        <div class="bib">${p.name.charAt(0)}</div>
        <div>
          <div class="name">${p.name}</div>
          <span class="team-chip" style="background:${color}">${p.team}</span>
        </div>
        <div class="rank-position">
          <div class="rank-pos-num">#${rank}</div>
          <div class="rank-pos-of">of ${totalP}</div>
        </div>
      </div>

      <div class="tile-grid">
        <div class="tile"><div class="num" style="color:var(--turf-dark)">${formatNumber(p.activity_points)}</div><div class="label">Activity points</div></div>
        <div class="tile"><div class="num" style="color:var(--flag-dark)">${formatNumber(p.bonus_points)}</div><div class="label">Bonus points</div></div>
        <div class="tile"><div class="num" style="color:var(--coral-dark)">${formatNumber(p.total_points)}</div><div class="label">Total points</div></div>
      </div>

      <!-- Comparison to average -->
      <div class="avg-compare">
        <span class="avg-label">Your total: <strong>${formatNumber(p.total_points)}</strong></span>
        <span class="avg-sep">vs</span>
        <span class="avg-label">Group avg: <strong>${formatNumber(groupAvg)}</strong></span>
        <span class="avg-badge ${p.total_points >= groupAvg ? 'above' : 'below'}">${p.total_points >= groupAvg ? '↑ Above' : '↓ Below'} average</span>
      </div>

      <!-- Streak -->
      <div class="section-head" style="margin-bottom:8px"><h2 style="font-size:18px">Current streak</h2></div>
      <div class="streak-flame">
        ${flameSvg(p.streak)}
        <span class="days">${p.streak || 0} day${p.streak === 1 ? '' : 's'}</span>
      </div>

      <!-- Milestones -->
      ${milestones.length ? `
      <div class="section-head" style="margin:20px 0 8px"><h2 style="font-size:18px">Milestones earned</h2></div>
      <div class="milestones-row">
        ${milestones.map(m => `<span class="milestone-badge">${m.icon} ${m.label}</span>`).join('')}
      </div>
      ` : ''}

      <!-- Personal trend + sport donut -->
      <div class="profile-charts">
        <div class="profile-chart-box">
          <div class="section-head" style="margin:20px 0 8px"><h2 style="font-size:18px">Points over time</h2></div>
          <div class="chart-wrap" style="height:200px"><canvas id="personalTrendChart"></canvas></div>
        </div>
        <div class="profile-chart-box">
          <div class="section-head" style="margin:20px 0 8px"><h2 style="font-size:18px">Sport mix</h2></div>
          <div class="chart-wrap chart-donut" style="height:200px"><canvas id="personalDonutChart"></canvas></div>
        </div>
      </div>

      <!-- Streak calendar / heatmap -->
      <div class="section-head" style="margin:20px 0 8px"><h2 style="font-size:18px">Activity calendar</h2></div>
      <div class="heatmap-wrap" id="personalHeatmap"></div>

      <!-- Sports this week -->
      <div class="section-head" style="margin:20px 0 4px"><h2 style="font-size:18px">This week's sports</h2></div>
      <div class="chip-row">
        ${allSports.map(s => `<span class="sport-chip ${active.has(s) ? 'active' : ''}">${s}</span>`).join('')}
      </div>
    </div>
  `;

  // Render personal trend chart
  const dailyPts = {};
  personDays.forEach(r => { dailyPts[r.date] = (dailyPts[r.date] || 0) + r.points; });
  const trendDates = Object.keys(dailyPts).sort();
  const trendLabels = trendDates.map(d => new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }));
  const trendData = trendDates.map(d => dailyPts[d]);

  if (personalChart) personalChart.destroy();
  const trendCtx = document.getElementById('personalTrendChart').getContext('2d');
  personalChart = new Chart(trendCtx, {
    type: 'bar',
    data: {
      labels: trendLabels,
      datasets: [{
        label: 'Points',
        data: trendData,
        backgroundColor: 'rgba(47,122,79,0.7)',
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });

  // Render personal sport donut
  const sportLabels = Object.keys(personSports).sort((a, b) => personSports[b] - personSports[a]);
  const sportData = sportLabels.map(s => personSports[s]);
  const sportColors = ['#E2542F', '#2F7A4F', '#2C6E9E', '#F2A93B', '#6B4FA0', '#C24B7C', '#1F5636', '#B23F20'];

  if (personalDonut) personalDonut.destroy();
  if (sportLabels.length > 0) {
    const donutCtx = document.getElementById('personalDonutChart').getContext('2d');
    personalDonut = new Chart(donutCtx, {
      type: 'doughnut',
      data: {
        labels: sportLabels,
        datasets: [{
          data: sportData,
          backgroundColor: sportColors.slice(0, sportLabels.length),
          borderWidth: 2,
          borderColor: '#FFFFFF'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 8, font: { size: 11 } } } }
      }
    });
  }

  // Render personal heatmap
  const heatmapEl = document.getElementById('personalHeatmap');
  const startD = new Date(EVENT_INFO.start_date);
  const today = new Date();
  const heatDates = [];
  for (let d = new Date(startD); d <= today; d.setDate(d.getDate() + 1)) {
    heatDates.push(d.toISOString().slice(0, 10));
  }
  const personDateSet = new Set(personDates);
  heatmapEl.innerHTML = '<div class="heatmap-grid">' + heatDates.map(d => {
    const wasActive = personDateSet.has(d);
    const dt = new Date(d);
    const label = dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    return `<div class="heat-cell ${wasActive ? 'level-3' : 'level-0'}" title="${label}: ${wasActive ? '✓ Active' : '—'}"></div>`;
  }).join('') + '</div>';

  // Fill progress bar
  fillLaneBar(document.getElementById('profileLane'), progressPct);
}

function flameSvg(streak) {
  const intensity = Math.min(1, (streak || 0) / 100);
  const color = intensity > 0.6 ? 'var(--coral)' : intensity > 0.25 ? 'var(--flag)' : 'var(--ink-faint)';
  return `<svg viewBox="0 0 24 24" fill="${color}"><path d="M12 2c1 3-2 4-2 7a3 3 0 0 0 6 0c0-1-.5-2-.5-2 2 1 3 3.5 3 5.5a6.5 6.5 0 0 1-13 0C5.5 8 9 6 12 2z"/></svg>`;
}

function renderLeaderboard() {
  const tbody = document.getElementById('lbBody');
  const sortKeyMap = { total: 'total_points', activity: 'activity_points', bonus: 'bonus_points', streak: 'streak' };
  const key = sortKeyMap[currentSort];
  const sorted = [...ALL_PARTICIPANTS].sort((a, b) => (b[key] || 0) - (a[key] || 0));

  tbody.innerHTML = sorted.length ? sorted.map((p, i) => `
    <tr style="cursor:pointer" data-name="${p.name}">
      <td>${i + 1}</td>
      <td>${p.name}</td>
      <td>${p.team}</td>
      <td>${formatNumber(p.activity_points)}</td>
      <td>${formatNumber(p.bonus_points)}</td>
      <td><strong>${formatNumber(p.total_points)}</strong></td>
      <td>${p.streak || 0}d</td>
    </tr>
  `).join('') : `<tr><td colspan="7" class="empty-state">No participants yet</td></tr>`;

  tbody.querySelectorAll('tr[data-name]').forEach(row => {
    row.addEventListener('click', () => {
      const p = ALL_PARTICIPANTS.find(x => x.name === row.dataset.name);
      if (p) {
        renderProfile(p);
        window.scrollTo({ top: 0, behavior: REDUCED_MOTION ? 'auto' : 'smooth' });
      }
    });
  });
}

document.getElementById('lbControls').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#lbControls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  renderLeaderboard();
});
</script>
</body>
</html>
