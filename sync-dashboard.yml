name: Sync dashboard data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest dashboard JSON from Apps Script
        env:
          DASHBOARD_WEBAPP_URL: ${{ secrets.DASHBOARD_WEBAPP_URL }}
        run: |
          curl -sSL "${DASHBOARD_WEBAPP_URL}?action=dashboardJson" -o data/dashboard.json
          cat data/dashboard.json | head -c 200

      - name: Commit if changed
        run: |
          git config user.name "dashboard-sync-bot"
          git config user.email "actions@github.com"
          git add data/dashboard.json
          git diff --cached --quiet || git commit -m "Sync dashboard data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
